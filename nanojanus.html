<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NanoJanus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&display=swap');

  :root {
    --bg: #0a0a0f;
    --fg: #e8e8e0;
    --dim: #666;
    --ghost: #444;
    --accent-fwd: #4a9eff;
    --accent-bwd: #ff6b4a;
    --accent-origin: #ffd700;
    --serif: 'EB Garamond', Georgia, serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--serif);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #logo {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: #555;
    user-select: none;
    font-weight: 500;
  }

  #janus-faces {
    position: fixed;
    top: 14px;
    right: 28px;
    font-size: 20px;
    color: #555;
    user-select: none;
    opacity: 0.5;
  }

  #mode-indicator {
    position: fixed;
    top: 18px;
    left: 28px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ghost);
    user-select: none;
    opacity: 0.6;
    text-transform: uppercase;
  }
  #mode-indicator.trained { color: #4a9eff; opacity: 0.8; }

  #metrics {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--ghost);
    letter-spacing: 1px;
    text-align: center;
    font-family: monospace;
  }

  #arena {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 40px 120px;
    overflow-y: auto;
  }

  #column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 100%;
    max-width: 700px;
  }

  .word-line {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(12px);
    animation: word-arrive 0.8s ease forwards;
    text-align: center;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .word-line.backward {
    color: var(--accent-bwd);
    animation-name: word-arrive-up;
  }

  .word-line.forward {
    color: var(--accent-fwd);
  }

  .word-line.origin {
    color: var(--accent-origin);
    font-weight: 700;
    font-size: 24px;
    border: 1px solid var(--accent-origin);
    padding: 4px 16px;
  }

  .word-line.wormhole {
    font-style: italic;
    text-decoration: underline;
    text-decoration-style: dotted;
  }

  .step-num {
    font-size: 9px;
    color: var(--dim);
    margin-right: 8px;
    font-family: monospace;
  }

  .step-debt {
    font-size: 9px;
    color: var(--ghost);
    margin-left: 8px;
    font-family: monospace;
  }

  @keyframes word-arrive {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes word-arrive-up {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #separator {
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-origin), transparent);
    margin: 12px 0;
    opacity: 0;
    animation: fade-in 1s ease forwards;
  }

  @keyframes fade-in { to { opacity: 1; } }

  /* weight load button */
  #load-weights-btn {
    position: fixed;
    bottom: 70px;
    right: 28px;
    font-family: var(--serif);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ghost);
    background: none;
    border: 1px solid #333;
    padding: 3px 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s ease;
    user-select: none;
  }
  #load-weights-btn:hover { color: var(--fg); border-color: var(--fg); }
  #weight-file { display: none; }

  /* input */
  #input-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    justify-content: center;
    background: linear-gradient(transparent, var(--bg) 30%);
  }

  #input-bar input {
    width: 500px;
    max-width: 70vw;
    padding: 12px 20px;
    font-size: 16px;
    font-family: var(--serif);
    background: #161620;
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--fg);
    outline: none;
  }

  #input-bar input:focus { border-color: var(--accent-fwd); }

  #input-bar button {
    padding: 12px 24px;
    font-family: var(--serif);
    font-size: 14px;
    background: #1a1a2e;
    color: var(--fg);
    border: 1px solid #333;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #input-bar button:hover { border-color: var(--accent-fwd); }

</style>
</head>
<body>

<div id="logo">N A N O J A N U S</div>
<div id="janus-faces">&#9668; &#9658;</div>
<div id="mode-indicator">field</div>
<div id="metrics"></div>

<div id="arena">
  <div id="column"></div>
</div>

  <button id="send">RESONATE</button>
</div>

// === BPE TOKENIZER ===

function bpeEncode(text) {
  let seq = [];
  for (let i = 0; i < text.length; i++) {
    let c = text.charCodeAt(i);
    if (c >= 65 && c <= 90) c = c - 65 + 97;
    if (c < 256) seq.push(c);
  }
  for (let m = 0; m < BPE_MERGES; m++) {
    const left = BPE_TABLE[m][0], right = BPE_TABLE[m][1];
    const newId = 256 + m;
    const out = [];
    for (let i = 0; i < seq.length; i++) {
      if (i < seq.length - 1 && seq[i] === left && seq[i+1] === right) {
        out.push(newId);
        i++;
      } else {
        out.push(seq[i]);
      }
    }
    seq = out;
  }
  return seq;
}

// === BPE DECODE TABLE ===
const bpeStrs = [];

function buildBpeStrs() {
  bpeStrs.length = 0;
  for (let i = 0; i < 256; i++)
    bpeStrs.push(String.fromCharCode(i));
  for (let m = 0; m < BPE_MERGES; m++) {
    const left = BPE_TABLE[m][0], right = BPE_TABLE[m][1];
    bpeStrs.push((bpeStrs[left] || '') + (bpeStrs[right] || ''));
  }
}

function bpeDecode(tokenId) {
  if (bpeStrs.length === 0) buildBpeStrs();
  if (tokenId >= 0 && tokenId < bpeStrs.length) return bpeStrs[tokenId];
  return '';
}

function initVocabBpe() {
  vocabBpe = [];
  for (let i = 0; i < NWORDS; i++)
    vocabBpe.push(bpeEncode(WORDS[i]));
}

const SUFFIX_FRAGMENTS = new Set(["ing","tion","ment","ness","ble","ful","ous","ive","ent","ant","ist","ity","ght","est","ter","ther","ted","ting","ally","ling"]);

function buildExtendedVocab() {
  extVocab = [];
  const wordSet = new Set();

  for (let i = 0; i < NWORDS; i++) {
    extVocab.push({
      word: WORDS[i],
      bpeIds: vocabBpe[i],
      fromHardcoded: true,
      origIdx: i
    });
    wordSet.add(WORDS[i].toLowerCase());
  }

  if (bpeStrs.length === 0) buildBpeStrs();
  let bpeAdded = 0;

  for (let t = 0; t < BPE_VOCAB; t++) {
    const s = bpeStrs[t];
    if (!s || s.length < 3) continue;
    if (!/^[a-zA-Z]+$/.test(s)) continue;
    const lower = s.toLowerCase();
    if (wordSet.has(lower)) continue;
    if (STOP.has(lower)) continue;
    if (SUFFIX_FRAGMENTS.has(lower)) continue;
    extVocab.push({
      word: lower,
      bpeIds: [t],
      fromHardcoded: false,
      origIdx: -1
    });
    wordSet.add(lower);
    bpeAdded++;
  }

  console.log('[nanojanus] extended vocab: ' + extVocab.length + ' words (' +
    NWORDS + ' hardcoded + ' + bpeAdded + ' from BPE)');
}

// === WORD TOKENIZER (for origin extraction and Dario overlay) ===
const SUFFIXES = ['ing','tion','sion','ment','ness','able','ible','ful','less','ous','ive','ity','ary','ery','ory','al','ly','er','ed','es','en','s'];

function tryStem(word) {
  for (const suf of SUFFIXES) {
    if (word.length > suf.length + 2 && word.endsWith(suf)) {
      const idx = WORDS.indexOf(word.slice(0, -suf.length));
      if (idx >= 0) return idx;
    }
  }
  return -1;
}

function tokenizeWords(text) {
  const words = text.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 0);
  const ids = [];
  for (const w of words) {
    if (STOP.has(w)) continue;
    const idx = WORDS.indexOf(w);
    if (idx >= 0) { ids.push(idx); continue; }
    const stemIdx = tryStem(w);
    if (stemIdx >= 0) { ids.push(stemIdx); continue; }
  }
  return ids;
}

// === CALENDAR DRIFT (from ariannamethod.c) ===
const AM_ANNUAL_DRIFT = 11.25;
const AM_GREGORIAN_YEAR = 365.25;
const AM_METONIC_YEARS = 19;
const AM_METONIC_LEAPS = 7;
const AM_MAX_UNCORRECTED = 33.0;
const METONIC_LEAP_YEARS = [3, 6, 8, 11, 14, 17, 19];
const EPOCH = new Date(2024, 9, 3, 12, 0, 0);

function calendarDaysSinceEpoch() {
  return Math.floor((Date.now() - EPOCH.getTime()) / 86400000);
}

function calendarCumulativeDrift(days) {
  const years = days / AM_GREGORIAN_YEAR;
  let baseDrift = years * AM_ANNUAL_DRIFT;
  const fullCycles = Math.floor(years / AM_METONIC_YEARS);
  let corrections = fullCycles * AM_METONIC_LEAPS * 30;
  const partial = years % AM_METONIC_YEARS;
  const yic = Math.floor(partial) + 1;
  for (let i = 0; i < AM_METONIC_LEAPS; i++)
    if (METONIC_LEAP_YEARS[i] <= yic) corrections += 30;
  return baseDrift - corrections;
}

function calendarDissonance(days) {
  const drift = calendarCumulativeDrift(days);
  const raw = Math.abs(drift % AM_MAX_UNCORRECTED) / AM_MAX_UNCORRECTED;
  return Math.max(0, Math.min(1, raw));
}

const chambers = new Float32Array(CH.N);

function updateChambers(stepIdx) {
  const depth = stepIdx / STEPS;
  if (depth < 0.33) chambers[CH.FLOW] += 0.05;
  else if (depth < 0.66) chambers[CH.FEAR] += 0.04;
  else chambers[CH.VOID] += 0.05;
  if (depth > 0.75) chambers[CH.COMPLEX] += 0.03;
  if (trauma > 0.3) chambers[CH.RAGE] += 0.04;
  const K = 0.02, old = new Float32Array(chambers);
  for (let i = 0; i < CH.N; i++) {
    for (let j = 0; j < CH.N; j++)
      if (i !== j) chambers[i] += K * Math.sin(old[j] - old[i]);
    chambers[i] = Math.max(0, Math.min(1, chambers[i] * chDecay[i]));
  }
}

// ===================================================================
// RESONANCE ENGINE -- 8-layer transformer (JS implementation)
//
// Matches penelope.c v7 forward pass exactly:
//   RMSNorm, RoPE, multi-head causal self-attention,
//   RRPRAM resonance with gated blend, SwiGLU FFN
// ===================================================================

function silu(x) {
  return x > -20.0 ? x / (1.0 + Math.exp(-x)) : 0.0;
}

function rmsnorm(x, g, n) {
  let ss = 0;
  for (let i = 0; i < n; i++) ss += x[i] * x[i];
  ss = ss / n + 1e-5;
  const inv = 1.0 / Math.sqrt(ss);
  const out = new Float32Array(n);
  for (let i = 0; i < n; i++) out[i] = g[i] * x[i] * inv;
  return out;
}

function matmulMV(W, x, rows, cols) {
  const out = new Float32Array(rows);
  for (let i = 0; i < rows; i++) {
    let s = 0;
    const off = i * cols;
    for (let j = 0; j < cols; j++) s += W[off + j] * x[j];
    out[i] = s;
  }
  return out;
}

function applyRope(q, k, seqLen, nHeads, headDim) {
  const thetaBase = 10000.0;
  for (let t = 0; t < seqLen; t++) {
    for (let h = 0; h < nHeads; h++) {
      const base = (t * nHeads + h) * headDim;
      for (let d = 0; d < headDim / 2; d++) {
        const freq = 1.0 / Math.pow(thetaBase, 2.0 * d / headDim);
        const cosF = Math.cos(t * freq);
        const sinF = Math.sin(t * freq);
        const q0 = q[base + d], q1 = q[base + d + headDim / 2];
        q[base + d] = q0 * cosF - q1 * sinF;
        q[base + d + headDim / 2] = q0 * sinF + q1 * cosF;
        const k0 = k[base + d], k1 = k[base + d + headDim / 2];
        k[base + d] = k0 * cosF - k1 * sinF;
        k[base + d + headDim / 2] = k0 * sinF + k1 * cosF;
      }
    }
  }
}

// Full forward pass: bpeIds[seqLen] -> logits[BPE_VOCAB]
function forward(m, bpeIds) {
  let S = bpeIds.length;
  if (S < 1) S = 1;
  if (S > MAX_SEQ) S = MAX_SEQ;

  const x = new Float32Array(S * DIM);
  for (let t = 0; t < S; t++) {
    let tok = bpeIds[t];
    if (tok < 0 || tok >= BPE_VOCAB) tok = 0;
    for (let d = 0; d < DIM; d++)
      x[t * DIM + d] = m.tok_emb[tok * DIM + d] + m.pos_emb[t * DIM + d];
  }

  for (let l = 0; l < N_LAYERS; l++) {
    const lw = m.layers[l];

    // 1. h = rmsnorm(x, attn_norm)
    const h = new Float32Array(S * DIM);
    for (let t = 0; t < S; t++) {
      const xSlice = x.subarray(t * DIM, (t + 1) * DIM);
      const normed = rmsnorm(xSlice, lw.attn_norm, DIM);
      h.set(normed, t * DIM);
    }

    // 2. q, k, v projections
    const q = new Float32Array(S * DIM);
    const k = new Float32Array(S * DIM);
    const v = new Float32Array(S * DIM);
    for (let t = 0; t < S; t++) {
      const ht = h.subarray(t * DIM, (t + 1) * DIM);
      q.set(matmulMV(lw.wq, ht, DIM, DIM), t * DIM);
      k.set(matmulMV(lw.wk, ht, DIM, DIM), t * DIM);
      v.set(matmulMV(lw.wv, ht, DIM, DIM), t * DIM);
    }

    // 3. RoPE
    applyRope(q, k, S, N_HEADS, HEAD_DIM);

    // 4. Multi-head causal attention
    const scale = 1.0 / Math.sqrt(HEAD_DIM);
    const av = new Float32Array(S * DIM);

    for (let hd = 0; hd < N_HEADS; hd++) {
      for (let ti = 0; ti < S; ti++) {
        const qiBase = (ti * N_HEADS + hd) * HEAD_DIM;
        const scores = new Float32Array(ti + 1);
        let maxs = -1e30;
        for (let tj = 0; tj <= ti; tj++) {
          const kjBase = (tj * N_HEADS + hd) * HEAD_DIM;
          let dot = 0;
          for (let d = 0; d < HEAD_DIM; d++) dot += q[qiBase + d] * k[kjBase + d];
          dot *= scale;
          scores[tj] = dot;
          if (dot > maxs) maxs = dot;
        }
        let sum = 0;
        for (let tj = 0; tj <= ti; tj++) {
          scores[tj] = Math.exp(scores[tj] - maxs);
          sum += scores[tj];
        }
        const invS = sum > 0 ? 1.0 / sum : 0;
        for (let tj = 0; tj <= ti; tj++) scores[tj] *= invS;

        const aviBase = (ti * N_HEADS + hd) * HEAD_DIM;
        for (let tj = 0; tj <= ti; tj++) {
          const a = scores[tj];
          if (a === 0) continue;
          const vjBase = (tj * N_HEADS + hd) * HEAD_DIM;
          for (let d = 0; d < HEAD_DIM; d++) av[aviBase + d] += a * v[vjBase + d];
        }
      }
    }

    // 5. Project through wo
    const qkvOut = new Float32Array(S * DIM);
    for (let t = 0; t < S; t++) {
      const avt = av.subarray(t * DIM, (t + 1) * DIM);
      qkvOut.set(matmulMV(lw.wo, avt, DIM, DIM), t * DIM);
    }

    // 6. RRPRAM resonance: rrp = h @ wr
    const rrp = new Float32Array(S * DIM);
    for (let t = 0; t < S; t++) {
      const ht = h.subarray(t * DIM, (t + 1) * DIM);
      rrp.set(matmulMV(lw.wr, ht, DIM, DIM), t * DIM);
    }

    // 7. Gated blend: softmax(gate[0], gate[1])
    const g0 = lw.gate[0], g1 = lw.gate[1];
    const gmax = Math.max(g0, g1);
    const e0 = Math.exp(g0 - gmax), e1 = Math.exp(g1 - gmax);
    const gsum = e0 + e1;
    const w0 = e0 / gsum, w1 = e1 / gsum;

    // 8. Residual: x = x + w0*qkvOut + w1*rrp
    for (let i = 0; i < S * DIM; i++)
      x[i] += w0 * qkvOut[i] + w1 * rrp[i];

    // 9. h2 = rmsnorm(x, ffn_norm)
    const h2 = new Float32Array(S * DIM);
    for (let t = 0; t < S; t++) {
      const xt = x.subarray(t * DIM, (t + 1) * DIM);
      h2.set(rmsnorm(xt, lw.ffn_norm, DIM), t * DIM);
    }

    // 10. SwiGLU FFN: x = x + w_down @ (silu(h2 @ w_gate) * (h2 @ w_up))
    for (let t = 0; t < S; t++) {
      const h2t = h2.subarray(t * DIM, (t + 1) * DIM);
      const fg = matmulMV(lw.w_gate, h2t, HDIM, DIM);
      const fu = matmulMV(lw.w_up, h2t, HDIM, DIM);
      const sw = new Float32Array(HDIM);
      for (let i = 0; i < HDIM; i++) sw[i] = silu(fg[i]) * fu[i];
      const fd = matmulMV(lw.w_down, sw, DIM, HDIM);
      for (let d = 0; d < DIM; d++) x[t * DIM + d] += fd[d];
    }
  }

  // Final: rmsnorm(x[last], final_norm) @ lm_head^T
  const xLast = x.subarray((S - 1) * DIM, S * DIM);
  const xn = rmsnorm(xLast, m.final_norm, DIM);
  const logits = matmulMV(m.lm_head, xn, BPE_VOCAB, DIM);
  return logits;
}

// BPE logits -> word scores (mean aggregation over BPE tokens per word)
function bpeLogitsToWordScores(bpeLogits) {
  const scores = new Float32Array(extVocab.length);
  for (let w = 0; w < extVocab.length; w++) {
    const ew = extVocab[w];
    const bl = ew.bpeIds.length;
    let s = 0;
    for (let b = 0; b < bl; b++) {
      const tok = ew.bpeIds[b];
      if (tok >= 0 && tok < BPE_VOCAB) s += bpeLogits[tok];
    }
    scores[w] = bl > 0 ? s / bl : 0;
  }
  return scores;
}

// ===================================================================
// PEN7 BINARY WEIGHT LOADING
//
// Format: 32-byte header (8 int32s) + float32 weights
// Header: [magic=0x50454E37, BPE_VOCAB, NWORDS, DIM, HDIM, N_HEADS, N_LAYERS, MAX_SEQ]
// ===================================================================

async function loadWeightsPEN7(buffer) {
  const headerView = new DataView(buffer, 0, 32);
  const magic = headerView.getInt32(0, true);
  if (magic !== 0x50454E37) {
    throw new Error('Not a PEN7 file (magic=0x' + magic.toString(16) + ')');
  }
  const hBpeVocab = headerView.getInt32(4, true);
  const hNWords = headerView.getInt32(8, true);
  const hDim = headerView.getInt32(12, true);
  const hHDim = headerView.getInt32(16, true);
  const hNHeads = headerView.getInt32(20, true);
  const hNLayers = headerView.getInt32(24, true);
  const hMaxSeq = headerView.getInt32(28, true);

  if (hBpeVocab !== BPE_VOCAB || hDim !== DIM ||
      hHDim !== HDIM || hNHeads !== N_HEADS || hNLayers !== N_LAYERS || hMaxSeq !== MAX_SEQ) {
    throw new Error('Config mismatch: BV=' + hBpeVocab +
      ' D=' + hDim + ' H=' + hHDim + ' NH=' + hNHeads + ' NL=' + hNLayers + ' S=' + hMaxSeq);
  }

  const floats = new Float32Array(buffer, 32);
  let offset = 0;

  function readFloats(n) {
    const arr = new Float32Array(n);
    arr.set(floats.subarray(offset, offset + n));
    offset += n;
    return arr;
  }

  const m = {};
  m.tok_emb = readFloats(BPE_VOCAB * DIM);
  m.pos_emb = readFloats(MAX_SEQ * DIM);
  m.final_norm = readFloats(DIM);
  m.lm_head = readFloats(BPE_VOCAB * DIM);

  m.layers = [];
  for (let l = 0; l < N_LAYERS; l++) {
    const lw = {};
    lw.attn_norm = readFloats(DIM);
    lw.wq = readFloats(DIM * DIM);
    lw.wk = readFloats(DIM * DIM);
    lw.wv = readFloats(DIM * DIM);
    lw.wo = readFloats(DIM * DIM);
    lw.wr = readFloats(DIM * DIM);
    lw.gate = readFloats(2);
    lw.ffn_norm = readFloats(DIM);
    lw.w_gate = readFloats(DIM * HDIM);
    lw.w_up = readFloats(DIM * HDIM);
    lw.w_down = readFloats(HDIM * DIM);
    m.layers.push(lw);
  }

  const totalParams = offset;
  console.log('PEN7 loaded: ' + totalParams + ' params (' + (totalParams * 4 / 1e6).toFixed(1) + 'MB)');
  return m;
}

// ===================================================================
// DARIO FIELD -- heuristic forces on top of word scores
// ===================================================================

function darioOverlay(logits, wordContext, prevWord, stepIdx, direction, vocabForOverlay) {
  const alpha_mod = 1 + 0.3*chambers[CH.LOVE] - 0.2*chambers[CH.RAGE] + 0.1*chambers[CH.FLOW];
  const gamma_mod = 1 + 0.4*chambers[CH.VOID] + 0.2*chambers[CH.COMPLEX];
  const calMod = 1 + 0.2 * calendarDissonance(calendarDaysSinceEpoch());
  const dirMod = direction === -1 ? 0.8 : 1.2;
  const gateR = 1 / (1 + Math.exp(-(resonanceField - 0.5) * 4));
  const h_g = silu(gateR * 2);
  const f_g = silu(gateR * 1.5);

  const nVocab = vocabForOverlay.length;
  for (let v = 0; v < nVocab; v++) {
    const oi = vocabForOverlay[v].origIdx;
    let B = 0;
    if (oi >= 0 && prevWord >= 0) B = Math.log(1 + getBigram(prevWord, oi)) * 4;

    let H = 0;
    if (oi >= 0) {
      for (const c of wordContext) H += Math.log(1 + getCooc(c, oi));
      H /= (wordContext.length + 1);
    }

    const F = prophecyDebt * (1 + Math.random() * 0.5);
    const A = destinyBias * gamma_mod * 0.5;

    logits[v] += (B + alpha_mod * 3 * H * h_g + 2 * F * f_g + A) * dirMod * calMod;
  }
}

// ===================================================================
// WORD SELECTION -- trained mode (transformer + Dario) or field mode
// ===================================================================

function selectWord(bpeContext, wordContext, prevWord, stepIdx, forbidden, direction) {
  let logits, vocab;

  if (model !== null && extVocab.length > 0) {
    // Trained mode: full 8-layer transformer forward pass
    const ids = bpeContext.length > MAX_SEQ ? bpeContext.slice(bpeContext.length - MAX_SEQ) : bpeContext;
    const bpeLogits = forward(model, ids);
    logits = bpeLogitsToWordScores(bpeLogits);
    vocab = extVocab;
  } else {
    // Field mode: score via Dario field only (no learned weights)
    logits = new Float32Array(NWORDS);
    vocab = [];
    for (let i = 0; i < NWORDS; i++)
      vocab.push({ word: WORDS[i], bpeIds: vocabBpe[i], fromHardcoded: true, origIdx: i });
  }

  darioOverlay(logits, wordContext, prevWord, stepIdx, direction, vocab);

  // Build candidates, applying forbidden filter
  let forbiddenWords = null;
  const indexed = [];
  for (let i = 0; i < vocab.length; i++) {
    const entry = vocab[i];
    if (entry.origIdx >= 0 && forbidden.has(entry.origIdx)) continue;
    if (entry.origIdx < 0) {
      if (!forbiddenWords) {
        forbiddenWords = new Set();
        for (const fi of forbidden) {
          if (typeof fi === 'number' && fi >= 0 && fi < NWORDS) forbiddenWords.add(WORDS[fi]);
          else if (typeof fi === 'string') forbiddenWords.add(fi);
        }
      }
      if (forbiddenWords.has(entry.word)) continue;
    }
    indexed.push({ word: entry.word, idx: entry.origIdx >= 0 ? entry.origIdx : -(i+1), extIdx: i, score: logits[i] });
  }

  if (indexed.length === 0) return { word: 'void', idx: 0, extIdx: 0, score: 0 };

  indexed.sort((a, b) => b.score - a.score);
  const topK = Math.min(8, indexed.length);
  const top = indexed.slice(0, topK);

  let mx = top[0].score, sum = 0;
  for (const s of top) { s.prob = Math.exp(s.score - mx); sum += s.prob; }
  for (const s of top) s.prob /= sum;

  let r = Math.random(), cum = 0;
  for (const s of top) { cum += s.prob; if (cum >= r) return s; }
  return top[0];
}

// === ORIGIN EXTRACTION (find most "charged" word from prompt) ===

function extractKey(text) {
  const ids = tokenizeWords(text);
  if (ids.length === 0) return Math.floor(Math.random() * NWORDS);
  let best = ids[0], bestScore = 0;
  for (const id of ids) {
    let sc = 0;
    for (const [k, v] of cooc) { const [a,b] = k.split(',').map(Number); if (a===id||b===id) sc += v; }
    if (sc > bestScore) { bestScore = sc; best = id; }
  }
  return best;
}

// === HELPER -- get BPE ids for a selected word ===
function getSelBpeIds(sel) {
  if (sel.idx >= 0 && sel.idx < NWORDS) return vocabBpe[sel.idx];
  if (sel.extIdx !== undefined && sel.extIdx >= 0 && sel.extIdx < extVocab.length)
    return extVocab[sel.extIdx].bpeIds;
  return bpeEncode(sel.word);
}

// ===================================================================
// BI-DIRECTIONAL REASONING
// ===================================================================

async function runChain(userText) {
  const column = document.getElementById('column');
  column.innerHTML = '';

  const inputBpe = bpeEncode(userText);
  const wordContext = tokenizeWords(userText);
  const seedIdx = extractKey(userText);
  const seedWord = WORDS[seedIdx] || 'void';

  // MetaJanus prophecy
  const calD = calendarDissonance(calendarDaysSinceEpoch());
  const predictedEntropy = 0.5 + 0.2*prophecyDebt + 0.1*calD + 0.15*personalDissonance();

  // Step direction split
  const nBackward = Math.max(1, Math.min(STEPS-1,
    Math.floor(STEPS * (0.3 + 0.4*prophecyDebt + 0.1*calD))));
  const nForward = STEPS - nBackward;

  updateMetrics();

  const forbidden = new Set();
  forbidden.add(seedIdx);
  const allSteps = [];

  // Show origin
  const originEl = makeWordEl('\u25cf ' + seedWord + ' \u25cf', 'origin', '', 0, false);
  column.appendChild(originEl);
  await sleep(600);

  // Two independent contexts growing simultaneously
  let fwdBpeCtx = [...inputBpe];
  let fwdWordCtx = [...wordContext];
  let fwdPrev = seedIdx;

  let bwdBpeCtx = [...inputBpe];
  let bwdWordCtx = [...wordContext];
  let bwdPrev = seedIdx;

  const maxSteps = Math.max(nForward, nBackward);

  for (let i = 0; i < maxSteps; i++) {
    // Generate BACKWARD word (prepend above origin)
    if (i < nBackward) {
      updateChambers(nForward + i);
      const sel = selectWord(bwdBpeCtx, bwdWordCtx, bwdPrev, nForward + i, forbidden, -1);
      allSteps.push(sel);

      const el = makeWordEl(sel.word, 'backward', '\u2191' + (nForward+i), prophecyDebt, false);
      column.insertBefore(el, column.firstChild);

      const wb = getSelBpeIds(sel);
      if (wb) for (const t of wb) bwdBpeCtx.push(t);
      if (sel.idx >= 0) bwdWordCtx.push(sel.idx);
      forbidden.add(sel.idx >= 0 ? sel.idx : sel.word);
      prophecyDebt = 0.9 * prophecyDebt + 0.1 * computeProphecyDebt([sel], 0);
      bwdPrev = sel.idx >= 0 ? sel.idx : -1;
    }

    // Generate FORWARD word (append below origin)
    if (i < nForward) {
      updateChambers(i);
      let isWormhole = false;
      if (prophecyDebt < 0.2 && wormhole > 0.1 && Math.random() < wormhole) {
        isWormhole = true;
      }
      const sel = selectWord(fwdBpeCtx, fwdWordCtx, fwdPrev, i, forbidden, 1);
      allSteps.push(sel);

      const el = makeWordEl(sel.word, 'forward', '\u2193' + i, prophecyDebt, isWormhole);
      column.appendChild(el);

      const wb = getSelBpeIds(sel);
      if (wb) for (const t of wb) fwdBpeCtx.push(t);
      if (sel.idx >= 0) fwdWordCtx.push(sel.idx);

      if (sel.idx >= 0 && fwdPrev >= 0) updateBigram(fwdPrev, sel.idx);
      if (sel.idx >= 0) {
        for (const c of wordContext) updateCooc(c, sel.idx);
      }
      forbidden.add(sel.idx >= 0 ? sel.idx : sel.word);
      prophecyDebt = 0.9 * prophecyDebt + 0.1 * computeProphecyDebt([sel], 0);
      fwdPrev = sel.idx >= 0 ? sel.idx : -1;
    }

    await sleep(700);
  }

  // Evaluate MetaJanus prophecy
  const avgDebt = allSteps.length > 0
    ? allSteps.reduce((s,x) => s + (x.debt || 0), 0) / allSteps.length : 0;
  const error = Math.abs(predictedEntropy - avgDebt);
  META.prophecyAccuracy = 0.9 * META.prophecyAccuracy + 0.1 * (1 - error);
  META.totalPredictions++;
  updateMetrics();
}

// === DISPLAY ===

function makeWordEl(word, cls, label, debt, isWormhole) {
  const div = document.createElement('div');
  div.className = 'word-line ' + cls + (isWormhole ? ' wormhole' : '');
  let html = '';
  if (label) html += '<span class="step-num">' + label + '</span>';
  html += word;
  if (debt > 0) html += '<span class="step-debt">debt=' + debt.toFixed(2) + '</span>';
  if (isWormhole) html += '<span class="step-debt"> \u2295WH</span>';
  div.innerHTML = html;
  return div;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateMetrics() {
  const days = calendarDaysSinceEpoch();
  const drift = calendarCumulativeDrift(days).toFixed(2);
  const diss = calendarDissonance(days).toFixed(3);
  const pd = personalDissonance().toFixed(3);
  const trained = model !== null;
  const wMode = trained ? 'resonance' : 'field';
  const extN = extVocab.length;
  document.getElementById('metrics').textContent =
    'drift=' + drift + '  diss=' + diss + '  personal=' + pd +
    '  debt=' + prophecyDebt.toFixed(3) + '  prophecy_acc=' + META.prophecyAccuracy.toFixed(3) +
    '  bpe=' + BPE_VOCAB + '  words=' + NWORDS + '  ext=' + extN +
    '  layers=' + N_LAYERS + '  mode=' + wMode;
}

// === ASYNC VOCABULARY LOADING ===
async function loadVocabulary() {
  try {
    const resp = await fetch('nanojanus.txt');
    if (!resp.ok) throw new Error('fetch failed: ' + resp.status);
    const text = await resp.text();
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    WORDS.length = 0;
    for (const l of lines) WORDS.push(l);
  } catch(e) {
    console.warn('[nanojanus] fetch failed, using inline vocab: ' + e.message);
    WORDS.length = 0;
    for (const w of FALLBACK_VOCAB) WORDS.push(w);
  }
  NWORDS = WORDS.length;
  initVocabBpe();
  buildBpeStrs();
  buildExtendedVocab();
  updateMetrics();
  console.log('[nanojanus] ready: ' + NWORDS + ' words, BPE vocab ' + BPE_VOCAB +
    ', ' + BPE_MERGES + ' merges, Resonance engine ' + N_LAYERS + ' layers');
}
loadVocabulary();

// === WEIGHT LOADING UI ===
const weightFileInput = document.getElementById('weight-file');
const loadWeightsBtn = document.getElementById('load-weights-btn');
const modeIndicator = document.getElementById('mode-indicator');

loadWeightsBtn.addEventListener('click', () => {
  weightFileInput.click();
});

weightFileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadWeightsBtn.textContent = 'loading...';
  loadWeightsBtn.disabled = true;
  try {
    const buffer = await file.arrayBuffer();
    model = await loadWeightsPEN7(buffer);
    modeIndicator.textContent = 'resonance';
    modeIndicator.classList.add('trained');
    loadWeightsBtn.textContent = 'weights loaded';
    loadWeightsBtn.style.color = '#4a9eff';
    loadWeightsBtn.style.borderColor = '#4a9eff';
    updateMetrics();
  } catch (err) {
    console.error('Weight load error:', err);
    loadWeightsBtn.textContent = 'error: ' + err.message;
    loadWeightsBtn.style.color = '#ff6b4a';
    loadWeightsBtn.disabled = false;
    model = null;
  }
});

// === EVENT HANDLERS ===
const inputEl = document.getElementById('prompt');
const sendBtn = document.getElementById('send');

async function submit() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  await runChain(text);
}

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
sendBtn.addEventListener('click', submit);

updateMetrics();
</script>
